name: CI

# Lint + production build gate for the slots game. Runs on every push to
# main and to claude/** branches (so auto-merge.yml has a real run to poll on
# the exact SHA — see that file's header for why), plus manual dispatch.
on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
